<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="かけいぼ">
  
  <title>かけいぼ - スマートなお金管理</title>

  <link rel="stylesheet" href="s/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div class="safe-area-top"></div>

    <main id="page-container">
      <section id="page-dashboard" class="page active">
        <header class="page-header">
          <h1 class="header-title">かけいぼ</h1>
          <div class="header-actions">
            <button class="icon-btn" id="btn-backup"><i class="fa-solid fa-cloud"></i></button>
          </div>
        </header>

        <div class="summary-grid">
          <div class="summary-card income">
            <span class="summary-label">収入</span>
            <span class="summary-amount" id="summary-income">¥0</span>
          </div>
          <div class="summary-card expense">
            <span class="summary-label">支出</span>
            <span class="summary-amount" id="summary-expense">¥0</span>
          </div>
          <div class="summary-card balance full-width">
            <span class="summary-label">今月の収支</span>
            <span class="summary-amount" id="summary-balance">¥0</span>
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-title"><i class="fa-solid fa-building-columns"></i> 口座残高</span>
          </div>
          <div id="account-list-dashboard" class="account-list"></div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> 最近の取引</span>
          </div>
          <div id="recent-transactions" class="transaction-list"></div>
        </div>
        <div class="bottom-spacer"></div>
      </section>

      <section id="page-transactions" class="page">
        <header class="page-header">
          <button class="back-btn" data-back="dashboard"><i class="fa-solid fa-chevron-left"></i></button>
          <h1 class="header-title">取引一覧</h1>
        </header>
        <div id="all-transactions" class="transaction-list"></div>
        <div class="bottom-spacer"></div>
      </section>

      <section id="page-input" class="page">
        <header class="page-header">
          <button class="back-btn" data-back="dashboard"><i class="fa-solid fa-xmark"></i></button>
          <h1 class="header-title" id="input-page-title">入力</h1>
          <button class="text-btn" id="btn-save-transaction">保存</button>
        </header>

        <div class="type-tabs">
          <button class="type-tab" data-type="income">収入</button>
          <button class="type-tab active" data-type="expense">支出</button>
          <button class="type-tab" data-type="transfer">移動</button>
        </div>

        <div class="form-body">
          <div class="form-group">
            <input type="number" id="input-amount" class="amount-input" placeholder="0" inputmode="numeric">
          </div>
          <div id="group-category" class="form-group">
            <label class="form-label">カテゴリー</label>
            <div id="category-picker" class="category-picker"></div>
          </div>
          <div class="form-group">
            <label class="form-label">支払元</label>
            <select id="input-account" class="form-select"></select>
          </div>
          <div id="group-to-account" class="form-group hidden">
            <label class="form-label">移動先</label>
            <select id="input-to-account" class="form-select"></select>
          </div>
          <div class="form-group">
            <label class="form-label">日付</label>
            <input type="date" id="input-date" class="form-input">
          </div>
          <div class="form-group">
            <input type="text" id="input-memo" class="form-input" placeholder="メモ">
          </div>
        </div>
      </section>

      <section id="page-report" class="page">
        <header class="page-header"><h1 class="header-title">レポート</h1></header>
        <div class="chart-wrap" style="height: 250px;"><canvas id="monthly-bar-chart"></canvas></div>
        <div class="bottom-spacer"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard"><i class="fa-solid fa-house"></i><span>ホーム</span></button>
      <button class="nav-item" data-page="transactions"><i class="fa-solid fa-list-ul"></i><span>履歴</span></button>
      <button class="nav-item nav-add" data-page="input"><div class="nav-add-circle"><i class="fa-solid fa-plus"></i></div></button>
      <button class="nav-item" data-page="report"><i class="fa-solid fa-chart-pie"></i><span>グラフ</span></button>
    </nav>
  </div>

  <div id="modal-backup" class="modal-overlay hidden">
    <div class="modal-sheet">
      <button id="btn-export-json" class="primary-btn">JSON書き出し</button>
      <input type="file" id="import-json" class="hidden">
      <label for="import-json" class="secondary-btn">復元</label>
      <button class="modal-close" data-modal="backup">閉じる</button>
    </div>
  </div>
  <div id="toast" class="toast">完了</div>

  <script src="s/js/app.js"></script>
</body>
</html>
