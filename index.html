<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かけいぼ</title>
  <link rel="stylesheet" href="s/CSS/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>

  <div id="app">
    <main id="page-container">

      <section id="page-dashboard" class="page active">
        <header>
          <h1>かけいぼ</h1>
          <button id="btn-backup"><i class="fa-solid fa-cloud"></i></button>
        </header>

        <div class="summary">
          <div class="sum-item">収入<br><span id="summary-income">¥0</span></div>
          <div class="sum-item">支出<br><span id="summary-expense">¥0</span></div>
          <div class="sum-item">収支<br><span id="summary-balance">¥0</span></div>
        </div>

        <div class="section">
          <div class="sec-header"><i class="fa-solid fa-building-columns"></i> 口座残高</div>
          <div id="account-list-dashboard"></div>
        </div>

        <div class="section">
          <div class="sec-header"><i class="fa-solid fa-clock-rotate-left"></i> 最近の取引</div>
          <div id="recent-transactions"></div>
        </div>
      </section>

      <section id="page-transactions" class="page">
        <header>
          <button class="back-btn" data-back="dashboard"><i class="fa-solid fa-chevron-left"></i></button>
          <h1>取引一覧</h1>
        </header>
        <div id="all-transactions"></div>
      </section>

      <section id="page-input" class="page">
        <header>
          <button class="back-btn" data-back="dashboard"><i class="fa-solid fa-xmark"></i></button>
          <h1>入力</h1>
          <button id="btn-save-transaction" class="save-btn">保存</button>
        </header>

        <div class="type-selector">
          <button class="type-tab" data-type="income">収入</button>
          <button class="type-tab active" data-type="expense">支出</button>
          <button class="type-tab" data-type="transfer">移動</button>
        </div>

        <div class="form">
          <div class="amount-wrap">
            <input type="number" id="input-amount" placeholder="0" inputmode="numeric">
          </div>
          
          <div id="group-category" class="form-group">
            <label>カテゴリー</label>
            <div id="category-picker"></div>
          </div>

          <div class="form-group">
            <label>支払元</label>
            <select id="input-account"></select>
          </div>

          <div id="group-to-account" class="form-group hidden">
            <label>移動先</label>
            <select id="input-to-account"></select>
          </div>

          <div class="form-group">
            <label>日付</label>
            <input type="date" id="input-date">
          </div>
          
          <div class="form-group">
            <input type="text" id="input-memo" placeholder="メモを入力">
          </div>
        </div>
      </section>

      <section id="page-report" class="page">
        <header><h1>レポート</h1></header>
        <div class="canvas-container">
          <canvas id="monthly-bar-chart"></canvas>
        </div>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard"><i class="fa-solid fa-house"></i><br>ホーム</button>
      <button class="nav-item" data-page="transactions"><i class="fa-solid fa-list-ul"></i><br>履歴</button>
      <button class="nav-item nav-plus" data-page="input"><i class="fa-solid fa-plus"></i></button>
      <button class="nav-item" data-page="report"><i class="fa-solid fa-chart-pie"></i><br>グラフ</button>
    </nav>
  </div>

  <div id="modal-backup" class="hidden modal-overlay">
    <div class="modal-content">
      <button id="btn-export-json">JSONとして保存</button>
      <label class="file-label">
        復元する
        <input type="file" id="import-json" style="display:none">
      </label>
      <button class="modal-close" data-modal="backup">閉じる</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="s/JS/app.js"></script>
</body>
</html>
