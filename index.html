<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="かけいぼ">
  <link rel="apple-touch-icon" href="icon.png">
  
  <title>かけいぼ - スマートなお金管理</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div id="app">
    <div class="safe-area-top"></div>

    <main id="page-container">

      <section id="page-dashboard" class="page active">
        <header class="page-header">
          <h1 class="header-title">かけいぼ</h1>
          <div class="header-actions">
            <button class="icon-btn" id="btn-wallet-check" title="財布チェック">
              <i class="fa-solid fa-wallet"></i>
            </button>
            <button class="icon-btn" id="btn-backup" title="バックアップ">
              <i class="fa-solid fa-cloud"></i>
            </button>
          </div>
        </header>

        <div class="month-nav">
          <button class="month-nav-btn" id="btn-prev-month"><i class="fa-solid fa-chevron-left"></i></button>
          <span class="month-label" id="dashboard-month-label">2026年4月</span>
          <button class="month-nav-btn" id="btn-next-month"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="summary-grid">
          <div class="summary-card income">
            <span class="summary-label">収入</span>
            <span class="summary-amount" id="summary-income">¥0</span>
          </div>
          <div class="summary-card expense">
            <span class="summary-label">支出</span>
            <span class="summary-amount" id="summary-expense">¥0</span>
          </div>
          <div class="summary-card balance full-width">
            <span class="summary-label">今月の収支</span>
            <span class="summary-amount" id="summary-balance">¥0</span>
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-title"><i class="fa-solid fa-building-columns"></i> 口座残高</span>
            <button class="text-btn" id="btn-go-accounts">管理</button>
          </div>
          <div id="account-list-dashboard" class="account-list">
            </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> 最近の取引</span>
            <button class="text-btn" id="btn-go-transactions">すべて</button>
          </div>
          <div id="recent-transactions" class="transaction-list">
            </div>
        </div>

        <div id="wallet-check-banner" class="wallet-banner hidden">
          <i class="fa-solid fa-bell"></i>
          <span>残高のズレを確認しましょう</span>
          <button class="wallet-banner-btn" id="btn-wallet-check-banner">実行</button>
        </div>

        <div class="bottom-spacer"></div>
      </section>

      <section id="page-transactions" class="page">
        <header class="page-header">
          <button class="back-btn" data-back="dashboard"><i class="fa-solid fa-chevron-left"></i></button>
          <h1 class="header-title">取引一覧</h1>
          <div class="header-actions">
            <button class="icon-btn" id="btn-filter-transactions"><i class="fa-solid fa-filter"></i></button>
          </div>
        </header>

        <div id="filter-panel" class="filter-panel hidden">
          <div class="filter-row">
            <select id="filter-type" class="filter-select">
              <option value="">全ての種類</option>
              <option value="income">収入</option>
              <option value="expense">支出</option>
              <option value="transfer">振替</option>
            </select>
            <select id="filter-account" class="filter-select">
              <option value="">全ての口座</option>
            </select>
          </div>
          <div class="filter-row">
            <button class="small-btn full-width" id="btn-filter-clear">フィルターをリセット</button>
          </div>
        </div>

        <div id="all-transactions" class="transaction-list">
          </div>
        <div class="bottom-spacer"></div>
      </section>

      <section id="page-input" class="page">
        <header class="page-header">
          <button class="back-btn" data-back="dashboard"><i class="fa-solid fa-xmark"></i></button>
          <h1 class="header-title" id="input-page-title">入力</h1>
          <button class="text-btn" id="btn-save-transaction">保存</button>
        </header>

        <div class="type-tabs">
          <button class="type-tab" data-type="income">収入</button>
          <button class="type-tab active" data-type="expense">支出</button>
          <button class="type-tab" data-type="transfer">振替</button>
        </div>

        <div class="form-body">
          <div class="form-group amount-group">
            <label class="form-label">金額</label>
            <div class="amount-input-wrap">
              <span class="currency-symbol">¥</span>
              <input type="number" id="input-amount" class="amount-input" placeholder="0" inputmode="numeric">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">カテゴリー</label>
            <div id="category-picker" class="category-picker">
              </div>
          </div>

          <div class="form-group" id="group-account">
            <label class="form-label">支払口座</label>
            <select id="input-account" class="form-select"></select>
          </div>

          <div class="form-group hidden" id="group-to-account">
            <label class="form-label">入金先口座</label>
            <select id="input-to-account" class="form-select"></select>
          </div>

          <div class="form-group">
            <label class="form-label">日付</label>
            <input type="date" id="input-date" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">メモ</label>
            <input type="text" id="input-memo" class="form-input" placeholder="詳細を入力">
          </div>

          <div id="group-delete" class="form-group hidden" style="margin-top: 32px;">
            <button class="danger-btn" id="btn-delete-transaction">この取引を削除</button>
          </div>
        </div>
        <div class="bottom-spacer"></div>
      </section>

      <section id="page-report" class="page">
        <header class="page-header">
          <h1 class="header-title">レポート</h1>
        </header>
        
        <div class="chart-wrap" style="height: 250px; margin-top: 16px;">
          <canvas id="monthly-bar-chart"></canvas>
        </div>

        <div class="section-card">
          <div class="section-header">
            <span class="section-title">カテゴリー別支出</span>
          </div>
          <div id="category-breakdown" class="category-breakdown">
            </div>
        </div>
        <div class="bottom-spacer"></div>
      </section>

      <section id="page-settings" class="page">
        <header class="page-header">
          <h1 class="header-title">設定</h1>
        </header>
        
        <div class="section-card">
          <div class="account-list">
            <div class="account-item" id="btn-manage-accounts">
              <div class="account-icon"><i class="fa-solid fa-wallet"></i></div>
              <div class="account-info"><div class="account-name">口座の編集・追加</div></div>
              <i class="fa-solid fa-chevron-right" style="color: #8E8E93;"></i>
            </div>
            <div class="account-item" id="btn-manage-categories">
              <div class="account-icon"><i class="fa-solid fa-tags"></i></div>
              <div class="account-info"><div class="account-name">カテゴリーの編集</div></div>
              <i class="fa-solid fa-chevron-right" style="color: #8E8E93;"></i>
            </div>
          </div>
        </div>
        <div class="bottom-spacer"></div>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard">
        <i class="fa-solid fa-house"></i><span>ホーム</span>
      </button>
      <button class="nav-item" data-page="transactions">
        <i class="fa-solid fa-list-ul"></i><span>履歴</span>
      </button>
      <button class="nav-item nav-add" data-page="input">
        <div class="nav-add-circle"><i class="fa-solid fa-plus"></i></div>
      </button>
      <button class="nav-item" data-page="report">
        <i class="fa-solid fa-chart-pie"></i><span>グラフ</span>
      </button>
      <button class="nav-item" data-page="settings">
        <i class="fa-solid fa-gear"></i><span>設定</span>
      </button>
    </nav>

    <div class="safe-area-bottom"></div>
  </div>

  <div id="modal-backup" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 class="modal-title">データ管理</h2>
        <button class="modal-close" data-modal="backup"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <button class="primary-btn full-width" id="btn-export-json" style="margin-bottom: 12px;">
          JSONで書き出し
        </button>
        <label class="secondary-btn full-width" style="display: flex; cursor: pointer;">
          JSONから復元
          <input type="file" id="import-json" style="display: none;" accept=".json">
        </label>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">完了しました</div>

  <script src="js/app.js"></script>
</body>
</html>
