<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かけいぼ</title>
  <link rel="stylesheet" href="s/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>

  <div id="app">
    <main id="page-container">

      <section id="page-dashboard" class="page active">
        <header>
          <h1>かけいぼ</h1>
          <button id="btn-backup">バックアップ</button>
        </header>

        <div class="summary">
          <div>収入: <span id="summary-income">¥0</span></div>
          <div>支出: <span id="summary-expense">¥0</span></div>
          <div>収支: <span id="summary-balance">¥0</span></div>
        </div>

        <div class="section">
          <h2>口座残高</h2>
          <div id="account-list-dashboard"></div>
        </div>

        <div class="section">
          <h2>最近の取引</h2>
          <div id="recent-transactions"></div>
        </div>
      </section>

      <section id="page-transactions" class="page">
        <header>
          <button class="back-btn" data-back="dashboard">戻る</button>
          <h1>取引一覧</h1>
        </header>
        <div id="all-transactions"></div>
      </section>

      <section id="page-input" class="page">
        <header>
          <button class="back-btn" data-back="dashboard">キャンセル</button>
          <h1>入力</h1>
          <button id="btn-save-transaction">保存</button>
        </header>

        <div class="type-selector">
          <button class="type-tab" data-type="income">収入</button>
          <button class="type-tab active" data-type="expense">支出</button>
          <button class="type-tab" data-type="transfer">移動</button>
        </div>

        <div class="form">
          <input type="number" id="input-amount" placeholder="金額" inputmode="numeric">
          
          <div id="group-category">
            <label>カテゴリー</label>
            <div id="category-picker"></div>
          </div>

          <div class="form-group">
            <label>支払元</label>
            <select id="input-account"></select>
          </div>

          <div id="group-to-account" class="hidden">
            <label>移動先</label>
            <select id="input-to-account"></select>
          </div>

          <input type="date" id="input-date">
          <input type="text" id="input-memo" placeholder="メモ">
        </div>
      </section>

      <section id="page-report" class="page">
        <header><h1>レポート</h1></header>
        <canvas id="monthly-bar-chart"></canvas>
      </section>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard">ホーム</button>
      <button class="nav-item" data-page="transactions">履歴</button>
      <button class="nav-item" data-page="input">＋</button>
      <button class="nav-item" data-page="report">グラフ</button>
    </nav>
  </div>

  <div id="modal-backup" class="hidden">
    <div class="modal-content">
      <button id="btn-export-json">JSON書き出し</button>
      <input type="file" id="import-json">
      <button class="modal-close" data-modal="backup">閉じる</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="s/js/app.js"></script>
</body>
</html>
