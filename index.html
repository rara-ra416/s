<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かけいぼ</title>
  <link rel="stylesheet" href="./CSS/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>

  <div id="app">
    <main id="page-container">
      <section id="page-dashboard" class="page active">
        <header>
          <h1>かけいぼ</h1>
        </header>
        <div class="summary">
          <div>収入: <span id="summary-income">¥0</span></div>
          <div>支出: <span id="summary-expense">¥0</span></div>
        </div>
      </section>
      <section id="page-input" class="page">
        <header>
          <h1>入力</h1>
          <button id="btn-save-transaction">保存</button>
        </header>
        <div class="form">
          <input type="number" id="input-amount" placeholder="0">
          <input type="date" id="input-date">
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard">ホーム</button>
      <button class="nav-item" data-page="input">＋</button>
    </nav>
  </div>

  <script src="./JS/app.js"></script>
</body>
</html>
