<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かけいぼ</title>
  <link rel="stylesheet" href="./CSS/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>

  <div id="app">
    <main id="page-container">
      <section id="page-dashboard" class="page active">
        <header>
          <h1>かけいぼ</h1>
          <button id="btn-backup"><i class="fa-solid fa-cloud"></i></button>
        </header>
        <div class="summary">
          <div class="sum-item">収入<br><span id="summary-income">¥0</span></div>
          <div class="sum-item">支出<br><span id="summary-expense">¥0</span></div>
          <div class="sum-item">収支<br><span id="summary-balance">¥0</span></div>
        </div>
        <div class="section">
          <h2>口座残高</h2>
          <div id="account-list-dashboard"></div>
        </div>
      </section>

      <section id="page-input" class="page">
        <header>
          <button class="back-btn" data-back="dashboard">キャンセル</button>
          <h1>入力</h1>
          <button id="btn-save-transaction">保存</button>
        </header>
        <div class="type-selector">
          <button class="type-tab active" data-type="expense">支出</button>
          <button class="type-tab" data-type="income">収入</button>
        </div>
        <div class="form">
          <input type="number" id="input-amount" placeholder="金額" inputmode="numeric">
          <input type="date" id="input-date">
          <select id="input-account"></select>
          <input type="text" id="input-memo" placeholder="メモ">
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-page="dashboard">ホーム</button>
      <button class="nav-item" data-page="input">＋</button>
    </nav>
  </div>

  <script src="./JavaScript/app.js"></script>
</body>
</html>
